name: Feature request
description: Suggest a new feature or improvement
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Explain the use case. What is hard, missing, or confusing today?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Suggested solution
      description: How do you imagine it should work from a user's point of view?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Workarounds you've tried or other ways to solve this.
